<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — SkillLoop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header container">
  <a href="/index.html" class="brand">
    <img src="/assets/skillloop-logo.png" alt="SkillLoop" class="brand-logo-img">
  </a>
  <div class="header-actions">
    <span class="muted">Already have an account?</span>
    <a href="/login.html" class="btn btn-secondary">Log In</a>
  </div>
</header>

<main class="container" style="max-width: 460px; padding-top: 3rem; padding-bottom: 3rem;">
  <div class="card">
    <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem;">Create your account</h1>
    <p class="muted" style="margin-bottom: 1.6rem; font-size: 0.9rem;">Start building real-world life skills today.</p>

    <div id="form-error" class="form-error" role="alert"></div>
    <div id="form-success" class="form-success" role="status"></div>

    <form id="signup-form" novalidate>
      <div class="field">
        <label for="full-name">Full name</label>
        <input type="text" id="full-name" name="full-name" autocomplete="name" required placeholder="First Last">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create Account</button>
    </form>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/supabase-client.js"></script>
<script>
  const form = document.getElementById('signup-form');
  const errorBox = document.getElementById('form-error');
  const successBox = document.getElementById('form-success');
  const submitBtn = document.getElementById('submit-btn');

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('visible');
    successBox.classList.remove('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.classList.remove('visible');
    successBox.classList.remove('visible');

    const fullName = document.getElementById('full-name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Creating account…';

    const { data, error } = await window.supabaseClient.auth.signUp({
      email,
      password,
      options: { data: { full_name: fullName } }
    });

    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';

    if (error) {
      showError(error.message);
      return;
    }

    // If email confirmation is required, there's no session yet.
    if (data.session) {
      window.location.href = '/dashboard.html';
    } else {
      successBox.textContent = 'Account created! Check your email to confirm, then log in.';
      successBox.classList.add('visible');
      form.reset();
    }
  });
</script>
</body>
</html>
